{% extends 'base.html' %}

{% block title %}Edit Student - AURA Academics{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title text-white">Edit Student Profile</h1>
    <p class="page-subtitle text-muted">Modify metadata details for {{ student.name }}. Changing this does not alter historical record logs.</p>
</div>

<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="glass-card">
            <h3 class="card-section-title text-info mb-4"><i class="fa-solid fa-user-pen me-2"></i>Profile Metadata</h3>
            
            <form action="{{ url_for('student.edit_student', student_db_id=student.id) }}" method="POST">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label text-light small">Student ID (Institutional ID - Read Only)</label>
                        <input type="text" class="form-control dark-input bg-black-subtle text-muted" value="{{ student.student_id }}" readonly disabled>
                    </div>
                    
                    <div class="col-12">
                        <label for="name" class="form-label text-light small">Student Full Name</label>
                        <input type="text" class="form-control dark-input" id="name" name="name" value="{{ student.name }}" required>
                    </div>
                    
                    <div class="col-6">
                        <label for="age" class="form-label text-light small">Age</label>
                        <input type="number" class="form-control dark-input" id="age" name="age" value="{{ student.age }}" min="15" max="100" required>
                    </div>
                    
                    <div class="col-6">
                        <label for="previous_gpa" class="form-label text-light small">Previous Cumulative GPA</label>
                        <input type="number" step="0.01" class="form-control dark-input" id="previous_gpa" name="previous_gpa" value="{{ student.previous_gpa }}" min="0.00" max="4.00" required>
                    </div>
                    
                    <div class="col-12">
                        <label for="course" class="form-label text-light small">Course Program</label>
                        <input type="text" class="form-control dark-input" id="course" name="course" value="{{ student.course }}" required>
                    </div>
                    
                    <div class="col-6">
                        <label for="semester" class="form-label text-light small">Semester</label>
                        <input type="number" class="form-control dark-input" id="semester" name="semester" value="{{ student.semester }}" min="1" max="10" required>
                    </div>
                    
                    <div class="col-6">
                        <label for="section" class="form-label text-light small">Section</label>
                        <input type="text" class="form-control dark-input" id="section" name="section" value="{{ student.section }}" required>
                    </div>
                </div>
                
                <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top border-dark">
                    <a href="{{ url_for('student.show_student', student_db_id=student.id) }}" class="btn btn-outline-secondary text-light border-secondary">Cancel</a>
                    <button type="submit" class="btn btn-info btn-glow px-4">Update Profile</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
